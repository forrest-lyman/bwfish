<div class="feed-card" [class.sidebar]="layout() === 'sidebar'">
  <form class="feed-form" [formGroup]="feedForm" (ngSubmit)="submit()">
    <div class="feed-composer">
      <textarea
        #textInput
        formControlName="text"
        rows="1"
        [placeholder]="prompt()"
        (input)="resizeTextarea(textInput)"
      ></textarea>
      <button type="submit" class="submit-btn" [disabled]="feedForm.invalid || submitting()" aria-label="Send question">
        @if (submitting()) {
          <span class="submit-label">...</span>
        } @else {
          <svg lucideSendHorizontal class="send-icon" aria-hidden="true"></svg>
        }
      </button>
    </div>
  </form>

  @if (error()) {
    <p class="feed-error">{{ error() }}</p>
  }

  @if (feedThreads().length) {
    <div class="feed-entries">
      @for (thread of feedThreads(); track thread.item.entry.id) {
        <div class="feed-thread">
          <app-feed-entry
            [item]="thread.item"
            [currentUserId]="auth.user()?.uid ?? null"
            [voting]="votingEntryId() === thread.item.entry.id"
            [managing]="managingEntryId() === thread.item.entry.id"
            (vote)="vote(thread.item, $event)"
            (edit)="editEntry(thread.item, $event)"
            (delete)="deleteEntry(thread.item)"
            (reviewChanges)="openReview(thread.item)"
          />
          @if (thread.replies.length) {
            <div class="feed-replies">
              @for (reply of thread.replies; track reply.entry.id) {
                <app-feed-entry
                  [item]="reply"
                  [reply]="true"
                  [currentUserId]="auth.user()?.uid ?? null"
                  [voting]="votingEntryId() === reply.entry.id"
                  [managing]="managingEntryId() === reply.entry.id"
                  (vote)="vote(reply, $event)"
                  (edit)="editEntry(reply, $event)"
                  (delete)="deleteEntry(reply)"
                />
              }
            </div>
          }
        </div>
      }
    </div>
  }
</div>

<app-dialog [open]="reviewOpen()" title="Review changes" (closed)="closeReview()">
  <app-markdown-diff [original]="reviewOriginal()" [modified]="reviewModified()" />
</app-dialog>
